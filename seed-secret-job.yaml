apiVersion: batch/v1
kind: Job
metadata:
  name: seed-kv-secret
  namespace: healthcare-dev
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: healthcare-app-sa
      restartPolicy: Never
      containers:
        - name: seed
          image: mcr.microsoft.com/azure-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Logging in via Workload Identity federated token..."
              for i in $(seq 1 10); do
                az login --service-principal \
                  -u "$AZURE_CLIENT_ID" \
                  --tenant "$AZURE_TENANT_ID" \
                  --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                  --allow-no-subscriptions && break
                echo "login retry $i"; sleep 10
              done
              CONN='postgresql://pgadmin:HcLiveDev733833!@hc-pg-dev-live733833.postgres.database.azure.com:5432/healthcare?sslmode=require'
              for i in $(seq 1 12); do
                if az keyvault secret set --vault-name hc-kv-dev-733833 --name database-url --value "$CONN" -o none; then
                  echo "SECRET_SET_OK"; break
                fi
                echo "secret set retry $i (waiting for RBAC propagation)"; sleep 15
              done
              az keyvault secret show --vault-name hc-kv-dev-733833 --name database-url --query name -o tsv
