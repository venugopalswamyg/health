apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keyvault-provider
spec:
  provider: azure
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # Workload Identity: the pod's federated SA token is used to read Key Vault.
    clientID: '{{ .Values.keyvault.clientId | default "" }}'
    keyvaultName: '{{ .Values.keyvault.name | default "my-keyvault" }}'
    tenantId: '{{ .Values.keyvault.tenantId | default "placeholder-tenant-id" }}'
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
          objectVersion: ""

# Workload Identity wiring: create an AAD app/UAMI, grant it Key Vault Secrets User
# on the vault, federate it to this namespace/serviceaccount, and set the client id
# in serviceAccount.annotations (see README).
