apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "healthcare-app.fullname" . }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: example.healthcare-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "healthcare-app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
  tls:
    - hosts:
        - example.healthcare-app.local
      secretName: tls-healthcare-app
